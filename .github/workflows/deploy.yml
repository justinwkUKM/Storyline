name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev
      - main

env:
  GCP_PROJECT_ID: storyline-6cd69
  GCP_REGION: asia-southeast1
  RUNTIME_SERVICE_ACCOUNT: storyline-cloud-run@storyline-6cd69.iam.gserviceaccount.com
  GEMINI_SECRET: storyline-gemini-api-key
  SESSION_SECRET: storyline-session-secret
  SHARE_SECRET: storyline-share-token-secret

jobs:
  checks:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: staging
    env:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Google Cloud auth secrets
        run: |
          if { [ -n "$WIF_PROVIDER" ] && [ -z "$WIF_SERVICE_ACCOUNT" ]; } || { [ -z "$WIF_PROVIDER" ] && [ -n "$WIF_SERVICE_ACCOUNT" ]; }; then
            echo "WIF_PROVIDER and WIF_SERVICE_ACCOUNT must be configured together."
            exit 1
          fi
          if [ -z "$WIF_PROVIDER" ] && [ -z "$GCP_CREDENTIALS_JSON" ]; then
            echo "Configure either WIF_PROVIDER + WIF_SERVICE_ACCOUNT or GCP_CREDENTIALS_JSON for this environment."
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity
        if: env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud with service account JSON
        if: env.WIF_PROVIDER == '' && env.GCP_CREDENTIALS_JSON != ''
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          credentials_json: ${{ env.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy staging service
        run: |
          gcloud run deploy storyline-staging \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 0.08 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --execution-environment gen1 \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --set-env-vars "NODE_ENV=production,FIREBASE_PROJECT_ID=$GCP_PROJECT_ID" \
            --set-secrets "GEMINI_API_KEY=$GEMINI_SECRET:latest,SESSION_SECRET=$SESSION_SECRET:latest,SHARE_TOKEN_SECRET=$SHARE_SECRET:latest"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Google Cloud auth secrets
        run: |
          if { [ -n "$WIF_PROVIDER" ] && [ -z "$WIF_SERVICE_ACCOUNT" ]; } || { [ -z "$WIF_PROVIDER" ] && [ -n "$WIF_SERVICE_ACCOUNT" ]; }; then
            echo "WIF_PROVIDER and WIF_SERVICE_ACCOUNT must be configured together."
            exit 1
          fi
          if [ -z "$WIF_PROVIDER" ] && [ -z "$GCP_CREDENTIALS_JSON" ]; then
            echo "Configure either WIF_PROVIDER + WIF_SERVICE_ACCOUNT or GCP_CREDENTIALS_JSON for this environment."
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity
        if: env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud with service account JSON
        if: env.WIF_PROVIDER == '' && env.GCP_CREDENTIALS_JSON != ''
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          credentials_json: ${{ env.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy production service
        run: |
          gcloud run deploy storyline \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 0.08 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --execution-environment gen1 \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --set-env-vars "NODE_ENV=production,FIREBASE_PROJECT_ID=$GCP_PROJECT_ID" \
            --set-secrets "GEMINI_API_KEY=$GEMINI_SECRET:latest,SESSION_SECRET=$SESSION_SECRET:latest,SHARE_TOKEN_SECRET=$SHARE_SECRET:latest"

      - name: Deploy Firestore rules and indexes
        run: npx --yes firebase-tools@latest deploy --only firestore --project "$GCP_PROJECT_ID"
